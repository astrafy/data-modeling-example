version: 2

models:
  - name: dim_customers
    description: "Customer dimension — one row per customer."
    columns:
      - name: customer_id
        description: "Primary key."
        data_tests:
          - unique
          - not_null
      - name: customer_name
        data_tests:
          - not_null
      - name: signup_date
        data_tests:
          - not_null
      - name: signup_month
        description: "Truncated to month for cohort bucketing."
        data_tests:
          - not_null
